substitutions:
  name: esp32c6-compatibility-test
  device_description: "Verify the project builds from source on ESP32C6"
  external_components_source: github://syssi/esphome-ant-bms@main

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: VERY_VERBOSE

api:
  reboot_timeout: 0s


esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - id: client0
    mac_address: 16:aa:22:02:23:55
  - id: client1
    mac_address: 16:aa:22:02:23:66

ant_bms_ble:
  - id: bms0
    ble_client_id: client0
    update_interval: 5s

ant_bms_old_ble:
  - id: bms3
    ble_client_id: client1
    update_interval: 5s
    password: "12345678"

uart:
  - id: uart_0
    baud_rate: 19200
    rx_buffer_size: 384
    tx_pin: GPIO16
    rx_pin: GPIO17
  - id: uart_1
    baud_rate: 19200
    rx_buffer_size: 384
    tx_pin: GPIO18
    rx_pin: GPIO19

ant_bms:
  - id: bms1
    uart_id: uart_0
    update_interval: 10s
    rx_timeout: 50ms

ant_bms_old:
  - id: bms2
    uart_id: uart_0
    update_interval: 10s
    rx_timeout: 50ms
    password: "12345678"

sensor:
  - platform: ant_bms_ble
    ant_bms_ble_id: bms0
    total_voltage:
      name: "ant_bms_ble total voltage"

  - platform: ant_bms
    ant_bms_id: bms1
    total_voltage:
      name: "ant_bms total voltage"

  - platform: ant_bms_old
    ant_bms_old_id: bms2
    total_voltage:
      name: "ant_bms_old total voltage"

  - platform: ant_bms_old_ble
    ant_bms_old_ble_id: bms3
    total_voltage:
      name: "ant_bms_old_ble total voltage"

switch:
  - platform: ant_bms_ble
    ant_bms_ble_id: bms0
    charging:
      name: "ant_bms_ble charging"
    discharging:
      name: "ant_bms_ble discharging"
    balancer:
      name: "ant_bms_ble balancer"
    buzzer:
      name: "ant_bms_ble buzzer"

  - platform: ant_bms
    ant_bms_id: bms1
    charging:
      name: "ant_bms charging"
    discharging:
      name: "ant_bms discharging"
    balancer:
      name: "ant_bms balancer"
    buzzer:
      name: "ant_bms buzzer"

button:
  - platform: ant_bms_ble
    ant_bms_ble_id: bms0
    current_zero:
      name: "ant_bms_ble current zero"
    shutdown:
      name: "ant_bms_ble shutdown"
    clear_system_log:
      name: "ant_bms_ble clear system log"
    factory_reset:
      name: "ant_bms_ble factory reset"
    restart:
      name: "ant_bms_ble restart"
    bluetooth_initialization:
      name: "ant_bms_ble bluetooth initialization"
    bluetooth_off:
      name: "ant_bms_ble bluetooth off"
    bluetooth_on:
      name: "ant_bms_ble bluetooth on"
    clear_discharge_cycle_ah:
      name: "ant_bms_ble clear discharge cycle ah"
    clear_charge_cycle_ah:
      name: "ant_bms_ble clear charge cycle ah"
    clear_discharge_time:
      name: "ant_bms_ble clear discharge time"
    clear_charge_time:
      name: "ant_bms_ble clear charge time"
    clear_running_time:
      name: "ant_bms_ble clear running time"
    clear_protect_time:
      name: "ant_bms_ble clear protect time"
    reset_hardware:
      name: "ant_bms_ble reset hardware"
    save_customer_data:
      name: "ant_bms_ble save customer data"

  - platform: ant_bms
    ant_bms_id: bms1
    current_zero:
      name: "ant_bms current zero"
    shutdown:
      name: "ant_bms shutdown"
    clear_system_log:
      name: "ant_bms clear system log"
    factory_reset:
      name: "ant_bms factory reset"
    restart:
      name: "ant_bms restart"
    bluetooth_initialization:
      name: "ant_bms bluetooth initialization"
    bluetooth_off:
      name: "ant_bms bluetooth off"
    bluetooth_on:
      name: "ant_bms bluetooth on"
    clear_discharge_cycle_ah:
      name: "ant_bms clear discharge cycle ah"
    clear_charge_cycle_ah:
      name: "ant_bms clear charge cycle ah"
    clear_discharge_time:
      name: "ant_bms clear discharge time"
    clear_charge_time:
      name: "ant_bms clear charge time"
    clear_running_time:
      name: "ant_bms clear running time"
    clear_protect_time:
      name: "ant_bms clear protect time"
    reset_hardware:
      name: "ant_bms reset hardware"
    save_customer_data:
      name: "ant_bms save customer data"
