    discharge_mosfet_status:
      name: "discharge mosfet status"
    balancer_status:
      name: "balancer status"
    total_runtime_formatted:
      name: "total runtime formatted"

switch:
  - platform: ant_bms
    ant_bms_id: bms0
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    # BMS version 2021 only
    # Please enable supports_new_commands
    balancer:
      name: "balancer"

button:
