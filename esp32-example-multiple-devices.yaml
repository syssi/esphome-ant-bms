substitutions:
  name: ant-bms
  bms0: "${name} bms0"
  bms1: "${name} bms1"
  device_description: "Monitor and control two ANT Battery Management Systems (ANT-BMS) via UART"
  external_components_source: github://syssi/esphome-ant-bms@main
  rx_timeout: 50ms
  tx_pin_uart_0: GPIO16
  rx_pin_uart_0: GPIO17
  tx_pin_uart_1: GPIO14
  rx_pin_uart_1: GPIO4
  password: "12345678"

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-ant-bms"
    version: 2.5.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  - id: uart_0
    baud_rate: 19200
    rx_buffer_size: 384
    tx_pin: ${tx_pin_uart_0}
    rx_pin: ${rx_pin_uart_0}
  - id: uart_1
    baud_rate: 19200
    rx_buffer_size: 384
    tx_pin: ${tx_pin_uart_1}
    rx_pin: ${rx_pin_uart_1}

ant_bms:
  - id: bms0
    uart_id: uart_0
    update_interval: 10s
    rx_timeout: ${rx_timeout}
    supports_new_commands: true
    password: "${password}"
  - id: bms1
    uart_id: uart_1
    update_interval: 10s
    rx_timeout: ${rx_timeout}
    supports_new_commands: true
    password: "${password}"

binary_sensor:
